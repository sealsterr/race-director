appId: com.racedirector.app
productName: RaceDirector
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - resources/**/*
extraResources:
  - from: src/main/lmu-telemetry-bridge/bin/Release/net9.0
    to: telemetry-bridge
    filter:
      - '**/*'
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/rd-icon-2.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: RaceDirector
  uninstallDisplayName: RaceDirector
  installerIcon: resources/rd-icon-2.ico
  uninstallerIcon: resources/rd-icon-2.ico
  include: build/installer.nsh
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: sealsterr
  repo: race-director
  releaseType: release
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
